name: Build and publish .mcpb

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'skills/**'
      - 'manifest.json'
      - 'package.json'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      # Fail the build only on high-or-critical severity advisories so
      # noise from low/moderate findings doesn't block shipping. Pinned
      # to --production so dev-only deps (esbuild, mcpb tooling) don't
      # gate releases — they don't ship in the .mcpb.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - run: npm run build:extension

      # Package the .mcpb bundle for distribution.
      - name: Package .mcpb
        run: |
          cd .mcpb-build
          zip -r ../orbit-lifecycle-marketing-system-for-claude.mcpb . -x "*.DS_Store"

      # Extract the version from manifest.json so the versioned key in
      # the bucket matches the release. Jobs downstream use this env var.
      - name: Extract version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./manifest.json').version)")
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building orbit-v$VERSION"

      # Upload to the private Railway-backed Tigris bucket. Three
      # objects per release:
      #   - mcpb/orbit-v{version}.mcpb   — immutable versioned archive
      #   - mcpb/latest.mcpb             — always-latest alias (the
      #                                    one /api/mcpb-download serves)
      #   - manifest.json                — proxied by
      #                                    /api/orbit/latest-version
      # The website only reads these via signed URLs — the bucket
      # itself is private, no public ingress.
      - name: Upload to MCPB bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ORBIT_MCPB_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.ORBIT_MCPB_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.ORBIT_MCPB_S3_REGION }}
          S3_ENDPOINT: ${{ secrets.ORBIT_MCPB_S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.ORBIT_MCPB_S3_BUCKET }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          aws --endpoint-url "$S3_ENDPOINT" s3 cp \
            orbit-lifecycle-marketing-system-for-claude.mcpb \
            "s3://$S3_BUCKET/mcpb/orbit-v$VERSION.mcpb" \
            --content-type application/zip
          aws --endpoint-url "$S3_ENDPOINT" s3 cp \
            orbit-lifecycle-marketing-system-for-claude.mcpb \
            "s3://$S3_BUCKET/mcpb/latest.mcpb" \
            --content-type application/zip
          aws --endpoint-url "$S3_ENDPOINT" s3 cp \
            manifest.json \
            "s3://$S3_BUCKET/manifest.json" \
            --content-type application/json
          echo "Uploaded orbit-v$VERSION.mcpb, latest.mcpb, and manifest.json"

      # Notify the get-orbit website immediately that a new MCPB
      # version is live. Triggers the sync-mcpb-version workflow
      # there, which updates lib/orbit-version.ts + appends a
      # changelog stub + pushes → Railway auto-deploys.
      #
      # Without this dispatch, the website's 15-minute cron picks
      # the new version up anyway — but this is the fast path,
      # usually within 30 seconds.
      #
      # Needs a PAT scoped `repo` stored as
      # ORBIT_WEBSITE_DISPATCH_TOKEN in this repo's Actions secrets.
      # If the secret isn't set, this step silently no-ops so the
      # build still succeeds; the cron will catch up.
      - name: Notify website of new release
        if: ${{ success() }}
        env:
          DISPATCH_TOKEN: ${{ secrets.ORBIT_WEBSITE_DISPATCH_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "ORBIT_WEBSITE_DISPATCH_TOKEN not set — skipping website dispatch. 15-minute cron will pick up the release."
            exit 0
          fi
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/justinwilliames-sketch/get-orbit/dispatches \
            -d "{\"event_type\":\"orbit-mcpb-released\",\"client_payload\":{\"version\":\"$VERSION\"}}" \
            && echo "Website dispatch fired for v$VERSION" \
            || echo "Website dispatch failed — cron will catch up."
