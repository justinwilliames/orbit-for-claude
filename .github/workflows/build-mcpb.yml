name: Build and publish .mcpb

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'skills/**'
      - 'tests/**'
      - 'manifest.json'
      - 'package.json'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # contents:write so we can publish a tagged GitHub Release carrying the
    # .mcpb — the stable, versioned artifact the Claude extension directory
    # tracks for auto-update, and a clean public download in its own right.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      # Fail the build only on high-or-critical severity advisories so
      # noise from low/moderate findings doesn't block shipping. Pinned
      # to --production so dev-only deps (esbuild, mcpb tooling) don't
      # gate releases — they don't ship in the .mcpb.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      # Gate the release on the test suite. This is the whole point of
      # having tests: a broken tool must fail CI here and block the publish,
      # not ship silently. (The mjml@5 async compile break shipped for 2
      # months precisely because nothing ran the suite in CI — only the
      # local `npm run smoke` script caught it, and only by chance.)
      # `npm test` spawns the real MCP server and asserts on the compile
      # path (tests/suites/05-email-pipeline.test.mjs); `npm run smoke`
      # additionally exercises the raw exported functions end-to-end with a
      # full brand kit. Both are hermetic — mocked upstreams, no network.
      - name: Run tests
        run: npm test

      - name: Run smoke
        run: npm run smoke

      - run: npm run build:extension

      # Package the .mcpb bundle for distribution.
      - name: Package .mcpb
        run: |
          cd .mcpb-build
          zip -r ../orbit-lifecycle-marketing-system-for-claude.mcpb . -x "*.DS_Store"

      # Extract the version from manifest.json so the versioned key in
      # the bucket matches the release. Jobs downstream use this env var.
      - name: Extract version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./manifest.json').version)")
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building orbit-v$VERSION"

      # Upload to the private Railway-backed Tigris bucket. Three
      # objects per release:
      #   - mcpb/orbit-v{version}.mcpb   — immutable versioned archive
      #   - mcpb/latest.mcpb             — always-latest alias (the
      #                                    one /api/mcpb-download serves)
      #   - manifest.json                — proxied by
      #                                    /api/orbit/latest-version
      # The website only reads these via signed URLs — the bucket
      # itself is private, no public ingress.
      - name: Upload to MCPB bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ORBIT_MCPB_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.ORBIT_MCPB_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.ORBIT_MCPB_S3_REGION }}
          S3_ENDPOINT: ${{ secrets.ORBIT_MCPB_S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.ORBIT_MCPB_S3_BUCKET }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          aws --endpoint-url "$S3_ENDPOINT" s3 cp \
            orbit-lifecycle-marketing-system-for-claude.mcpb \
            "s3://$S3_BUCKET/mcpb/orbit-v$VERSION.mcpb" \
            --content-type application/zip
          aws --endpoint-url "$S3_ENDPOINT" s3 cp \
            orbit-lifecycle-marketing-system-for-claude.mcpb \
            "s3://$S3_BUCKET/mcpb/latest.mcpb" \
            --content-type application/zip
          aws --endpoint-url "$S3_ENDPOINT" s3 cp \
            manifest.json \
            "s3://$S3_BUCKET/manifest.json" \
            --content-type application/json
          echo "Uploaded orbit-v$VERSION.mcpb, latest.mcpb, and manifest.json"

      # Publish a tagged GitHub Release with the .mcpb attached. This is the
      # versioned, stable-URL artifact the Claude extension directory tracks
      # for auto-update, and a public download path in its own right. Skips
      # cleanly if a release for this version already exists (re-run safety).
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists — updating asset."
            gh release upload "v$VERSION" \
              orbit-lifecycle-marketing-system-for-claude.mcpb --clobber
          else
            gh release create "v$VERSION" \
              orbit-lifecycle-marketing-system-for-claude.mcpb \
              --title "Orbit v$VERSION" \
              --latest \
              --notes "Orbit MCPB v$VERSION. Free — needs a free account: get your Activation Key at https://yourorbit.team. Install: download the .mcpb and double-click it (Claude Desktop replaces any older version in place), then paste your Activation Key in Settings → Extensions → Orbit."
          fi

      # Website version-sync runs on a 5-minute cron in get-orbit
      # (.github/workflows/sync-mcpb-version.yml). No dispatch needed
      # from here — the cron is the single source of pickup, which
      # removes the cross-repo PAT and its silent-expiry failure mode.
      # Banner lag on a fresh release is at most ~5 minutes.
